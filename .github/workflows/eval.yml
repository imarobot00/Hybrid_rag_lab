name: RAG Evaluation                      # check name shown on the PR

on:                                        # WHEN this workflow runs
  pull_request:                            # on every PR...
    branches: [main]                       # ...targeting the main branch
    paths-ignore:                          # ...but skip docs-only PRs (save cost)
      - "**/*.md"
      - "notes/**"
  workflow_dispatch:                       # also allow manual runs from the UI

permissions:
  contents: read                           # read the repo
  pull-requests: write                     # needed to post the results comment

jobs:
  evaluate:
    runs-on: ubuntu-latest                 # the VM image GitHub gives us

    services:                              # sidecar containers for the job
      qdrant:                              # a real Qdrant for retrieval
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333                      # expose Qdrant on localhost:6333

    steps:
      - name: Checkout code                # step 1: get the PR's code
        uses: actions/checkout@v4

      - name: Set up Python                # step 2: install Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv                   # step 3: install the uv package manager
        run: pip install uv

      - name: Install dependencies         # step 4: sync the locked environment
        run: uv sync --frozen

      - name: Ingest corpus into Qdrant    # step 5: build the SDN collection
        env:
          QDRANT_URL: http://localhost:6333
        run: uv run python scripts/ingest.py

      - name: Start RAG server             # step 6: boot FastAPI in the background
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          QDRANT_URL: http://localhost:6333
        run: |
          uv run uvicorn app.main:app --port 8000 > server.log 2>&1 &
          # Wait up to 90s for the server to report healthy.
          for i in $(seq 1 90); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "server up after ${i}s"; break
            fi
            sleep 1
          done

      - name: Run eval suite (CI subset)   # step 7: the actual gate
        id: eval
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          QDRANT_URL: http://localhost:6333
          EVAL_SUBSET: "8"                  # CI scores 8 pairs to stay fast/cheap
          JUDGE_MODEL: llama-3.1-8b-instant # cheap, high-rate-limit judge
        run: |
          set -o pipefail
          uv run pytest tests/ -v --tb=short | tee eval_output.txt

      - name: Comment results on PR        # step 8: post a summary comment
        if: always()                       # run even if the eval step failed
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let out = 'No output captured.';
            try { out = fs.readFileSync('eval_output.txt', 'utf8'); } catch (e) {}
            const body = '### RAG Eval Results\n```\n' + out.slice(-3000) + '\n```';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
